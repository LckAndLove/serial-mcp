name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            serial-db/package-lock.json
            serial-mcp/package-lock.json
      - name: 安装依赖
        run: |
          cd serial-db && npm install
          cd ../serial-mcp && npm install
      - name: 语法检查
        run: |
          node --check serial-db/listener.js
          node --check serial-db/db.js
          node --check serial-mcp/server.js
          node --check serial-mcp/monitor-window.js
      - name: 启动检查
        run: |
          cd serial-mcp
          node -e "import('./server.js').then(() => { setTimeout(() => process.exit(0), 3000) }).catch(e => { console.error(e); process.exit(1) })"
